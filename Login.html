<!DOCTYPE html>
<html>
<head>
<title>College Login - College Management System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

html, body{
height:100%;
}

body{
background:#f4f6f9;
display:flex;
flex-direction:column;
}

.header{
background:#00264d;
color:white;
text-align:center;
padding:25px;
}

.header h1{
font-size:28px;
}

.header p{
margin-top:5px;
font-size:15px;
}

.container{
display:flex;
justify-content:center;
align-items:center;
flex:1;
padding:30px;
}

.login-box{
background:white;
padding:35px;
width:390px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.18);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#00264d;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:11px;
margin-bottom:6px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#004080;
box-shadow:0 0 5px rgba(0,64,128,0.3);
}

small{
display:block;
min-height:18px;
margin-bottom:8px;
font-size:12px;
}

.valid{
color:green;
}

.invalid{
color:red;
}

.show-pass{
font-size:13px;
margin:5px 0 15px;
color:#333;
}

.show-pass input{
width:auto;
margin-right:5px;
}

button{
width:100%;
padding:12px;
background:#004080;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00264d;
}

.register-link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.register-link a{
color:#004080;
text-decoration:none;
font-weight:bold;
}

.register-link a:hover{
text-decoration:underline;
}

.footer{
background:#00264d;
color:white;
text-align:center;
padding:15px;
font-size:14px;
margin-top:auto;
}
</style>
</head>

<body>

<div class="header">
<h1>K.H. Kabbur Institute of Engineering</h1>
<p>College Management System</p>
</div>

<div class="container">

<div class="login-box">

<h2>User Login</h2>

<form action="LoginCheck.jsp" method="post" onsubmit="return validateLogin()">

<label>Email</label>
<input type="email" name="email" id="email" placeholder="Enter your email" required>
<small id="emailMsg"></small>

<label>Password</label>
<input type="password" name="password" id="password" placeholder="Enter your password" required>
<small id="passwordMsg"></small>

<div class="show-pass">
<input type="checkbox" onclick="togglePassword()"> Show Password
</div>

<button type="submit">Login</button>

</form>

<div class="register-link">
Don't have an account?
<a href="UserRegistration.html">Register Here</a>
</div>

</div>

</div>

<div class="footer">
&copy; 2026 K.H. Kabbur Institute of Engineering | College Management System
</div>

<script>
function togglePassword(){
    let password = document.getElementById("password");

    if(password.type === "password"){
        password.type = "text";
    }else{
        password.type = "password";
    }
}

function validateEmail(){
    let email = document.getElementById("email").value.trim();
    let msg = document.getElementById("emailMsg");

    let emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

    let wrongDomains = [
        "gaiml.com",
        "gamil.com",
        "gmial.com",
        "gnail.com",
        "gmail.co",
        "gmail.con",
        "gmail.cm"
    ];

    if(email === ""){
        msg.innerHTML = "Email is required";
        msg.className = "invalid";
        return false;
    }

    let domain = email.split("@")[1];

    if(wrongDomains.includes(domain)){
        msg.innerHTML = "Wrong email domain. Did you mean gmail.com?";
        msg.className = "invalid";
        return false;
    }

    if(!emailPattern.test(email)){
        msg.innerHTML = "Enter valid Gmail address like student@gmail.com";
        msg.className = "invalid";
        return false;
    }

    msg.innerHTML = "Valid Gmail address";
    msg.className = "valid";
    return true;
}

function validatePassword(){
    let password = document.getElementById("password").value;
    let msg = document.getElementById("passwordMsg");

    if(password.trim() === ""){
        msg.innerHTML = "Password is required";
        msg.className = "invalid";
        return false;
    }

    msg.innerHTML = "";
    return true;
}

function validateLogin(){
    let emailOk = validateEmail();
    let passwordOk = validatePassword();

    return emailOk && passwordOk;
}

document.getElementById("email").addEventListener("keyup", validateEmail);
document.getElementById("password").addEventListener("keyup", validatePassword);
</script>

</body>
</html>
