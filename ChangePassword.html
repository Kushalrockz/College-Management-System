<!DOCTYPE html>
<html>
<head>

<title>Change Password - College Management System</title>

<meta charset="UTF-8">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#00264d;
color:white;
text-align:center;
padding:25px;
}

.header h1{
font-size:28px;
}

.header p{
margin-top:5px;
font-size:15px;
}

.navbar{
background:linear-gradient(90deg,#00264d,#004080,#0059b3);
padding:14px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.navbar a{
color:white;
text-decoration:none;
margin:0 20px;
font-weight:bold;
transition:0.3s;
}

.navbar a:hover{
color:#ffd700;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:65vh;
}

.box{
background:white;
padding:35px;
width:400px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.box h2{
text-align:center;
margin-bottom:25px;
color:#00264d;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#004080;
}

button{
width:100%;
padding:12px;
background:#004080;
color:white;
border:none;
border-radius:5px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00264d;
}


.login-link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.login-link a{
color:#004080;
text-decoration:none;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}

.footer{
background:#00264d;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>

</head>

<body>

<div class="header">
<h1>K.H. Kabbur Institute of Engineering</h1>
<p>College Management System</p>
</div>


<div class="container">

<div class="box">

<h2>Change Password</h2>

<form action="ChangePassword.jsp" method="post">

<label>Email</label>
<input type="email" name="email" placeholder="Enter your registered email" required>

<label>Old Password</label>
<input type="password" name="oldpass" placeholder="Enter old password" required>

<label>New Password</label>
<input type="password" name="newpass" placeholder="Enter new password" required>

<button type="submit">Update Password</button>

</form>

</div>

</div>

<div class="footer">
<p>&copy; 2026 KHKIE College Management System | Developed for Academic Project</p>
</div>

</body>
</html>
